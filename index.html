<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; }
    .card { text-align: center; padding: 3rem 2rem; max-width: 500px; }
    .card h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .card p { font-size: 1.1rem; line-height: 1.8; color: #ccc; margin-bottom: 0.5rem; }
    .badge { display: inline-block; margin-top: 1.5rem; padding: 0.6rem 1.5rem; border: 1px solid #888; border-radius: 20px; font-size: 0.9rem; color: #aaa; }
    @media (max-width: 480px) { .card h1 { font-size: 1.8rem; } .card { padding: 2rem 1.2rem; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>안녕하세요 👋</h1>
    <p>AI와 웹 개발을 탐구하는</p>
    <p>HEEWOO의 공간입니다.</p>
    <span class="badge">Powered by GitHub Pages</span>
  </div>
</body>
</html>
